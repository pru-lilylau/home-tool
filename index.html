<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭存摺</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F7F2E7;
    --paper-2:#EFE7D6;
    --card:#FFFDF8;
    --ink:#1F3A3D;
    --ink-2:#3D5A5E;
    --stamp:#B23A2E;
    --stamp-2:#8E2E24;
    --sage:#7C8F79;
    --gold:#B8935A;
    --line:#D9CFB9;
    --income:#3D6B4F;
    --expense:#B23A2E;
    --shadow: 0 2px 10px rgba(31,58,61,0.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Noto Sans TC',sans-serif;
    background:
      radial-gradient(circle at 1px 1px, rgba(31,58,61,0.05) 1px, transparent 0) 0 0/16px 16px,
      var(--paper);
    color:var(--ink);
    padding:24px 16px 60px;
  }
  .wrap{max-width:960px;margin:0 auto;}
  header.top{
    display:flex;align-items:baseline;justify-content:space-between;
    border-bottom:3px double var(--ink);
    padding-bottom:12px;margin-bottom:18px;flex-wrap:wrap;gap:8px;
  }
  header.top h1{
    font-family:'Noto Serif TC',serif;font-weight:900;font-size:26px;margin:0;letter-spacing:2px;
  }
  header.top .sub{font-size:12px;color:var(--ink-2);letter-spacing:1px;}

  /* passbook tabs */
  .tabs{display:flex;gap:6px;margin-bottom:-1px;position:relative;z-index:2;flex-wrap:wrap;}
  .tab{
    flex:1;min-width:90px;text-align:center;padding:12px 8px 10px;
    font-family:'Noto Serif TC',serif;font-weight:700;font-size:15px;
    background:var(--paper-2);color:var(--ink-2);
    border:1px solid var(--line);border-bottom:none;
    border-radius:10px 10px 0 0;cursor:pointer;
    transition:all .15s ease;
    letter-spacing:1px;position:relative;
  }
  .tab .mark{display:block;font-size:10px;font-weight:400;margin-top:2px;letter-spacing:2px;opacity:.7;}
  .tab.active{
    background:var(--card);color:var(--ink);
    box-shadow:0 -2px 6px rgba(31,58,61,0.06);
  }
  .tab.active{border-top:3px solid var(--tab-color, var(--ink));}
  .tab .rm-book{
    position:absolute;top:4px;right:6px;font-size:11px;color:var(--line);
    background:none;border:none;cursor:pointer;line-height:1;display:none;
  }
  .tab:hover .rm-book{display:block;}
  .tab .rm-book:hover{color:var(--stamp);}
  .tab-add{
    flex:0 0 auto;min-width:44px;text-align:center;padding:12px 10px 10px;
    background:transparent;color:var(--ink-2);border:1px dashed var(--line);border-bottom:none;
    border-radius:10px 10px 0 0;cursor:pointer;font-size:16px;font-weight:700;
  }
  .tab-add:hover{background:var(--paper-2);}

  .book{
    background:var(--card);border:1px solid var(--line);border-radius:0 8px 8px 8px;
    box-shadow:var(--shadow);padding:20px;
  }

  .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px;}
  @media (max-width:680px){.summary{grid-template-columns:repeat(2,1fr);}}
  .sum-card{
    background:var(--paper-2);border:1px solid var(--line);border-radius:8px;
    padding:12px 10px;text-align:center;
  }
  .sum-card .lbl{font-size:11px;color:var(--ink-2);letter-spacing:1px;margin-bottom:4px;}
  .sum-card .val{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:17px;}
  .sum-card.balance .val{color:var(--ink);}
  .sum-card.income .val{color:var(--income);}
  .sum-card.expense .val{color:var(--expense);}
  .sum-card.savings .val{color:var(--gold);}

  h2.section{
    font-family:'Noto Serif TC',serif;font-size:15px;font-weight:700;
    display:flex;align-items:center;gap:8px;margin:26px 0 10px;color:var(--ink);
  }
  h2.section::after{content:'';flex:1;height:1px;background:var(--line);}

  /* add transaction form */
  .form-row{display:grid;grid-template-columns:120px 90px 140px 1fr 110px auto;gap:8px;align-items:end;}
  @media (max-width:820px){.form-row{grid-template-columns:1fr 1fr;}}
  .field label{display:block;font-size:11px;color:var(--ink-2);margin-bottom:4px;}
  .field input,.field select{
    box-sizing:border-box;width:100%;height:40px;padding:0 10px;
    border:1px solid var(--line);border-radius:6px;
    background:#fff;font-family:'Noto Sans TC',sans-serif;font-size:14px;color:var(--ink);
    line-height:38px;
    -webkit-appearance:none;-moz-appearance:none;appearance:none;
  }
  .field select{
    padding-right:30px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0 L5 6 L10 0 Z' fill='%233D5A5E'/></svg>");
    background-repeat:no-repeat;background-position:right 10px center;
    cursor:pointer;
  }
  .field input[type="date"]{padding-right:8px;}
  .field input::-webkit-calendar-picker-indicator{
    filter:invert(23%) sepia(13%) saturate(1200%) hue-rotate(140deg);
    cursor:pointer;
  }
  .field input:focus,.field select:focus{outline:2px solid var(--gold);outline-offset:1px;}
  .btn{
    box-sizing:border-box;height:40px;padding:0 16px;border:none;border-radius:6px;cursor:pointer;
    font-family:'Noto Sans TC',sans-serif;font-weight:700;font-size:13px;
    background:var(--ink);color:var(--paper);letter-spacing:1px;
    display:inline-flex;align-items:center;justify-content:center;
    transition:transform .1s ease, background .15s ease;
  }
  .btn:hover{background:var(--ink-2);}
  .btn:active{transform:scale(0.97);}
  .btn.stamp{background:var(--stamp);}
  .btn.stamp:hover{background:var(--stamp-2);}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink-2);}
  .btn.small{height:32px;padding:0 12px;font-size:12px;}

  /* passbook ledger table */
  table.ledger{width:100%;border-collapse:collapse;margin-top:14px;font-size:13px;}
  table.ledger thead th{
    text-align:left;font-weight:700;color:var(--ink-2);font-size:11px;
    letter-spacing:1px;border-bottom:2px solid var(--ink);padding:6px 8px;
  }
  table.ledger td{padding:9px 8px;border-bottom:1px dashed var(--line);vertical-align:middle;}
  table.ledger tbody tr:hover{background:rgba(184,147,90,0.06);}
  .amt{font-family:'JetBrains Mono',monospace;font-weight:600;text-align:right;white-space:nowrap;}
  .amt.plus{color:var(--income);}
  .amt.minus{color:var(--expense);}
  .amt.bal{font-weight:700;color:var(--ink);}
  .cat-badge{
    display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;
    background:var(--paper-2);color:var(--ink-2);border:1px solid var(--line);
  }
  .tx-note{display:block;font-size:11.5px;color:var(--ink-2);margin-top:2px;}
  .del-btn{background:none;border:none;color:var(--line);cursor:pointer;font-size:15px;line-height:1;}
  .del-btn:hover{color:var(--stamp);}
  .empty-hint{padding:20px 8px;text-align:center;color:var(--ink-2);font-size:13px;}

  /* expense chart */
  .chart-wrap{display:flex;gap:24px;align-items:center;flex-wrap:wrap;margin-top:12px;}
  .donut{width:180px;height:180px;border-radius:50%;flex:0 0 auto;position:relative;}
  .donut::after{
    content:'';position:absolute;inset:24%;background:var(--card);border-radius:50%;
    display:flex;align-items:center;justify-content:center;
  }
  .donut-center{
    position:absolute;inset:24%;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;
  }
  .donut-center .lbl{font-size:10px;color:var(--ink-2);letter-spacing:1px;}
  .donut-center .val{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;}
  .legend{flex:1;min-width:220px;display:flex;flex-direction:column;gap:6px;}
  .legend-row{display:flex;align-items:center;gap:8px;font-size:12.5px;}
  .legend-dot{width:10px;height:10px;border-radius:3px;flex:0 0 auto;}
  .legend-name{flex:1;color:var(--ink);}
  .legend-pct{color:var(--ink-2);font-size:11px;width:38px;text-align:right;}
  .legend-amt{font-family:'JetBrains Mono',monospace;font-weight:600;width:90px;text-align:right;}

  /* savings cards */
  .savings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;margin-top:12px;}
  .save-card{
    background:var(--paper-2);border:1px solid var(--line);border-radius:10px;padding:14px;position:relative;
  }
  .save-card .bank{font-family:'Noto Serif TC',serif;font-weight:700;font-size:15px;margin-bottom:2px;}
  .save-card .who{font-size:11px;color:var(--ink-2);margin-bottom:10px;}
  .save-card .row{display:flex;justify-content:space-between;font-size:12.5px;margin:4px 0;color:var(--ink-2);}
  .save-card .row b{font-family:'JetBrains Mono',monospace;color:var(--ink);}
  .save-card .accrued{
    margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);
    display:flex;justify-content:space-between;align-items:center;
  }
  .save-card .accrued .val{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--gold);font-size:16px;}
  .save-card .actions{display:flex;gap:6px;margin-top:10px;}
  .save-card .rm{position:absolute;top:10px;right:10px;}

  .add-save-form{
    display:grid;grid-template-columns:1fr 100px 100px 130px auto;gap:8px;align-items:end;
  }
  @media (max-width:680px){.add-save-form{grid-template-columns:1fr 1fr;}}

  footer.note{margin-top:30px;text-align:center;font-size:11px;color:var(--ink-2);letter-spacing:1px;}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <h1>家庭存摺</h1>
      <div class="sub">收支記錄 · 活期利息追蹤</div>
    </div>
    <div class="sub" id="todayLabel"></div>
  </header>

  <div class="tabs" id="tabsBar"></div>

  <div class="book">
    <div class="summary">
      <div class="sum-card income"><div class="lbl">本月收入</div><div class="val" id="sumIncome">$0</div></div>
      <div class="sum-card expense"><div class="lbl">本月支出</div><div class="val" id="sumExpense">$0</div></div>
      <div class="sum-card balance"><div class="lbl">現金結餘</div><div class="val" id="sumBalance">$0</div></div>
      <div class="sum-card savings"><div class="lbl">活期本金＋應計利息</div><div class="val" id="sumSavings">$0</div></div>
    </div>

    <h2 class="section">新增記錄</h2>
    <div class="form-row">
      <div class="field"><label>日期</label><input type="date" id="txDate"></div>
      <div class="field"><label>類型</label>
        <select id="txType" onchange="onTypeChange()">
          <option value="expense">支出</option>
          <option value="income">收入</option>
        </select>
      </div>
      <div class="field"><label>項目</label>
        <select id="txCategory"></select>
      </div>
      <div class="field" id="othersField" style="display:none;"><label>自訂項目</label><input type="text" id="txOtherCat" placeholder="輸入項目名稱"></div>
      <div class="field" id="noteField"><label>備註</label><input type="text" id="txNote" placeholder="例：街市買餸 / 十二月人工"></div>
      <div class="field"><label>金額 (HKD)</label><input type="number" id="txAmount" placeholder="0.00" step="0.01"></div>
      <button class="btn stamp" onclick="addTx()">蓋章記帳</button>
    </div>

    <h2 class="section">收支明細</h2>
    <table class="ledger">
      <thead>
        <tr><th>日期</th><th>項目 / 備註</th><th style="text-align:right">支出</th><th style="text-align:right">收入</th><th style="text-align:right">結餘</th><th></th></tr>
      </thead>
      <tbody id="txBody"></tbody>
    </table>

    <h2 class="section">當月開支分佈</h2>
    <div class="chart-wrap" id="chartWrap"></div>

    <h2 class="section">活期戶口 · 利息追蹤</h2>
    <div class="add-save-form">
      <div class="field"><label>銀行 / 戶口名稱</label><input type="text" id="sBank" placeholder="例：滙豐 e-Savings"></div>
      <div class="field"><label>本金 (HKD)</label><input type="number" id="sPrincipal" placeholder="0.00"></div>
      <div class="field"><label>年利率 (%)</label><input type="number" id="sRate" placeholder="例：4.5" step="0.01"></div>
      <div class="field"><label>起息日</label><input type="date" id="sStart"></div>
      <button class="btn ghost" onclick="addSaving()">新增戶口</button>
    </div>
    <div class="sub" style="margin-top:6px;">應計利息已按日複息計算，反映本息不斷滾存嘅增長；每月到期會標示「建議結息」，撳掣即可將利息正式入返本金並留紀錄</div>
    <div class="savings-grid" id="savingsGrid"></div>
  </div>

  <footer class="note">資料只儲存喺你自己嘅帳戶，各本存摺互相獨立</footer>
</div>

<script>
const EXPENSE_CATS = ['Food','Home','Domestic Helper','Transportation','Personal','Mortgage','Electricity Bill','Water Bill','Insurance','Management Fee','Others'];
const INCOME_CATS = ['Salary','Commission','Interest','Bonus','Others'];
const CAT_COLORS = ['#B23A2E','#B8935A','#3D6B4F','#3D5A5E','#8A6E9F','#C97B4A','#7C8F79','#5E7A9C','#A8763E','#9C4F5E','#6B6B6B'];

let books = [];              // [{id,name,color}]
let currentBook = null;
let data = { transactions: [], savings: [] };

const DEFAULT_BOOKS = [
  {id:'family', name:'自己家庭', color:'#B23A2E'},
  {id:'mom', name:'媽媽', color:'#B8935A'},
  {id:'sister', name:'妹妹', color:'#7C8F79'}
];

document.getElementById('todayLabel').textContent = new Date().toLocaleDateString('zh-HK',{year:'numeric',month:'long',day:'numeric'});
document.getElementById('txDate').valueAsDate = new Date();
document.getElementById('sStart').valueAsDate = new Date();

function fmt(n){
  const sign = n < 0 ? '-' : '';
  return sign + '$' + Math.abs(n).toLocaleString('en-HK',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function populateCategorySelect(){
  const type = document.getElementById('txType').value;
  const cats = type === 'income' ? INCOME_CATS : EXPENSE_CATS;
  const sel = document.getElementById('txCategory');
  sel.innerHTML = cats.map(c=>`<option value="${c}">${c}</option>`).join('');
}

function onTypeChange(){
  populateCategorySelect();
  onCategoryMaybeOthers();
}

function onCategoryMaybeOthers(){
  const cat = document.getElementById('txCategory').value;
  document.getElementById('othersField').style.display = cat === 'Others' ? 'block' : 'none';
}

document.getElementById('txCategory').addEventListener('change', onCategoryMaybeOthers);

async function loadBooksList(){
  try{
    const res = await window.storage.get('books:list', false);
    books = res && res.value ? JSON.parse(res.value) : [...DEFAULT_BOOKS];
  }catch(e){
    books = [...DEFAULT_BOOKS];
  }
  if(!books.find(b=>b.id===currentBook)) currentBook = books[0]?.id;
  renderTabs();
}

async function saveBooksList(){
  try{ await window.storage.set('books:list', JSON.stringify(books), false); }
  catch(e){ console.error('儲存名單失敗', e); }
}

function renderTabs(){
  const bar = document.getElementById('tabsBar');
  bar.innerHTML = books.map(b=>`
    <div class="tab ${b.id===currentBook?'active':''}" style="--tab-color:${b.color}" onclick="switchBook('${b.id}')">
      ${b.name}
      ${books.length>1 ? `<button class="rm-book" onclick="event.stopPropagation();removeBook('${b.id}')" title="移除">✕</button>` : ''}
    </div>
  `).join('') + `<div class="tab-add" onclick="addBook()" title="新增家庭成員">＋</div>`;
}

function addBook(){
  const name = prompt('新增邊個嘅存摺？（例如：爸爸 / 姑姐 / 家姐）');
  if(!name || !name.trim()) return;
  const id = 'b' + Date.now();
  const color = CAT_COLORS[books.length % CAT_COLORS.length];
  books.push({id, name:name.trim(), color});
  saveBooksList();
  switchBook(id);
}

function removeBook(id){
  if(books.length<=1) return;
  if(!confirm('刪除呢本存摺會一併刪除入面所有記錄，確定繼續？')) return;
  books = books.filter(b=>b.id!==id);
  saveBooksList();
  if(currentBook===id) switchBook(books[0].id);
  else renderTabs();
}

async function loadBook(book){
  try{
    const res = await window.storage.get('ledger:'+book, false);
    data = res && res.value ? JSON.parse(res.value) : { transactions: [], savings: [] };
  }catch(e){
    data = { transactions: [], savings: [] };
  }
  populateCategorySelect();
  onCategoryMaybeOthers();
  render();
}

async function saveBook(){
  try{ await window.storage.set('ledger:'+currentBook, JSON.stringify(data), false); }
  catch(e){ console.error('儲存失敗', e); }
}

function switchBook(book){
  currentBook = book;
  renderTabs();
  loadBook(book);
}

function addTx(){
  const date = document.getElementById('txDate').value;
  const type = document.getElementById('txType').value;
  let category = document.getElementById('txCategory').value;
  const otherCat = document.getElementById('txOtherCat').value.trim();
  const note = document.getElementById('txNote').value.trim();
  const amount = parseFloat(document.getElementById('txAmount').value);
  if(category === 'Others' && otherCat) category = otherCat;
  if(!date || !category || isNaN(amount) || amount<=0){
    alert('請填妥日期、項目同金額');
    return;
  }
  data.transactions.push({id:Date.now(), date, type, category, note, amount});
  document.getElementById('txOtherCat').value='';
  document.getElementById('txNote').value='';
  document.getElementById('txAmount').value='';
  saveBook();
  render();
}

function delTx(id){
  data.transactions = data.transactions.filter(t=>t.id!==id);
  saveBook();
  render();
}

function addSaving(){
  const bank = document.getElementById('sBank').value.trim();
  const principal = parseFloat(document.getElementById('sPrincipal').value);
  const rate = parseFloat(document.getElementById('sRate').value);
  const start = document.getElementById('sStart').value;
  if(!bank || isNaN(principal) || principal<=0 || isNaN(rate) || !start){
    alert('請填妥銀行、本金、年利率同起息日');
    return;
  }
  data.savings.push({id:Date.now(), bank, principal, rate, start});
  document.getElementById('sBank').value='';
  document.getElementById('sPrincipal').value='';
  document.getElementById('sRate').value='';
  saveBook();
  render();
}

function delSaving(id){
  data.savings = data.savings.filter(s=>s.id!==id);
  saveBook();
  render();
}

function accruedInterest(s){
  const days = Math.max(0,(Date.now() - new Date(s.start).getTime())/86400000);
  const dailyRate = s.rate/100/365;
  const compounded = s.principal * Math.pow(1 + dailyRate, days);
  return compounded - s.principal;
}

function settleSaving(id){
  const s = data.savings.find(x=>x.id===id);
  if(!s) return;
  const interest = accruedInterest(s);
  if(interest <= 0) return;
  s.principal = s.principal + interest;
  s.start = new Date().toISOString().slice(0,10);
  data.transactions.push({id:Date.now(), date: s.start, type:'income', category:'Interest', note:`${s.bank} 活期利息結算`, amount: Math.round(interest*100)/100});
  saveBook();
  render();
}

function categoryColor(cat){
  const allCats = [...EXPENSE_CATS, ...INCOME_CATS];
  let idx = allCats.indexOf(cat);
  if(idx === -1) idx = Math.abs(hashCode(cat)) % CAT_COLORS.length;
  return CAT_COLORS[idx % CAT_COLORS.length];
}
function hashCode(str){
  let h=0; for(let i=0;i<str.length;i++){ h = ((h<<5)-h) + str.charCodeAt(i); h|=0; } return h;
}

function renderChart(monthExpenseTx){
  const wrap = document.getElementById('chartWrap');
  if(monthExpenseTx.length===0){
    wrap.innerHTML = `<div class="empty-hint">本月仲未有支出記錄</div>`;
    return;
  }
  const byCat = {};
  monthExpenseTx.forEach(t=>{
    const c = t.category || 'Others';
    byCat[c] = (byCat[c]||0) + t.amount;
  });
  const total = Object.values(byCat).reduce((a,b)=>a+b,0);
  const entries = Object.entries(byCat).sort((a,b)=>b[1]-a[1]);

  let acc = 0;
  const stops = entries.map(([cat,amt])=>{
    const pct = amt/total*100;
    const start = acc; acc += pct;
    return `${categoryColor(cat)} ${start.toFixed(2)}% ${acc.toFixed(2)}%`;
  }).join(', ');

  const legend = entries.map(([cat,amt])=>`
    <div class="legend-row">
      <span class="legend-dot" style="background:${categoryColor(cat)}"></span>
      <span class="legend-name">${cat}</span>
      <span class="legend-pct">${(amt/total*100).toFixed(0)}%</span>
      <span class="legend-amt">${fmt(amt)}</span>
    </div>
  `).join('');

  wrap.innerHTML = `
    <div class="donut" style="background:conic-gradient(${stops});">
      <div class="donut-center">
        <div class="lbl">本月支出</div>
        <div class="val">${fmt(total)}</div>
      </div>
    </div>
    <div class="legend">${legend}</div>
  `;
}

function render(){
  const sorted = [...data.transactions].sort((a,b)=> a.date===b.date ? a.id-b.id : a.date.localeCompare(b.date));
  let balance = 0;
  const rows = sorted.map(t=>{
    balance += t.type==='income' ? t.amount : -t.amount;
    return {...t, runningBalance: balance};
  });

  const tbody = document.getElementById('txBody');
  if(rows.length===0){
    tbody.innerHTML = `<tr><td colspan="6" class="empty-hint">仲未有記錄，喺上面新增第一筆啦</td></tr>`;
  }else{
    tbody.innerHTML = rows.slice().reverse().map(t=>`
      <tr>
        <td>${t.date}</td>
        <td>
          <span class="cat-badge">${t.category || 'Others'}</span>
          ${t.note ? `<span class="tx-note">${t.note}</span>` : ''}
        </td>
        <td class="amt minus">${t.type==='expense'?fmt(t.amount):''}</td>
        <td class="amt plus">${t.type==='income'?fmt(t.amount):''}</td>
        <td class="amt bal">${fmt(t.runningBalance)}</td>
        <td><button class="del-btn" onclick="delTx(${t.id})" title="刪除">✕</button></td>
      </tr>
    `).join('');
  }

  const now = new Date();
  const ym = now.toISOString().slice(0,7);
  const monthTx = data.transactions.filter(t=>t.date.startsWith(ym));
  const monthIncome = monthTx.filter(t=>t.type==='income').reduce((a,b)=>a+b.amount,0);
  const monthExpenseTx = monthTx.filter(t=>t.type==='expense');
  const monthExpense = monthExpenseTx.reduce((a,b)=>a+b.amount,0);

  document.getElementById('sumIncome').textContent = fmt(monthIncome);
  document.getElementById('sumExpense').textContent = fmt(monthExpense);
  document.getElementById('sumBalance').textContent = fmt(balance);

  const savingsTotal = data.savings.reduce((a,s)=>a + s.principal + accruedInterest(s), 0);
  document.getElementById('sumSavings').textContent = fmt(savingsTotal);

  renderChart(monthExpenseTx);

  const grid = document.getElementById('savingsGrid');
  if(data.savings.length===0){
    grid.innerHTML = `<div class="empty-hint">未有活期戶口，喺上面新增一個</div>`;
  }else{
    grid.innerHTML = data.savings.map(s=>{
      const interest = accruedInterest(s);
      const days = Math.max(0, Math.floor((Date.now()-new Date(s.start).getTime())/86400000));
      const monthlyEst = s.principal * (s.rate/100) / 12;
      const dueDate = new Date(new Date(s.start).getTime() + 30*86400000);
      const dueSoon = days >= 30;
      return `
      <div class="save-card">
        <button class="del-btn rm" onclick="delSaving(${s.id})" title="刪除">✕</button>
        <div class="bank">${s.bank}</div>
        <div class="who">起息日 ${s.start} · 已 ${days} 日${dueSoon ? ' · <span style="color:var(--stamp);font-weight:700;">建議結息</span>':''}</div>
        <div class="row"><span>本金</span><b>${fmt(s.principal)}</b></div>
        <div class="row"><span>年利率</span><b>${s.rate}%</b></div>
        <div class="row"><span>預估每月利息</span><b>${fmt(monthlyEst)}</b></div>
        <div class="row"><span>下次結息日</span><b>${dueDate.toISOString().slice(0,10)}</b></div>
        <div class="accrued">
          <span style="font-size:11px;color:var(--ink-2)">應計利息</span>
          <span class="val">${fmt(interest)}</span>
        </div>
        <div class="actions">
          <button class="btn small stamp" onclick="settleSaving(${s.id})">${dueSoon ? '本月結息入本金' : '結算入本金'}</button>
        </div>
      </div>`;
    }).join('');
  }
}

loadBooksList().then(()=>loadBook(currentBook));
</script>
